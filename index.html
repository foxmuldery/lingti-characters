<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵体 · 见光死角色造型图集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#0a0a14;color:#e0d8c8;font-family:"PingFang SC","Noto Serif SC",serif;overflow-x:hidden}

/* ── Layout ── */
.app{display:flex;min-height:100vh}
.main{flex:1;min-width:0;margin-left:180px}

/* ── Sidebar ── */
.sidebar{position:fixed;top:0;left:0;width:180px;height:100vh;
  background:#0d1020;border-right:1px solid rgba(180,160,120,.12);
  z-index:100;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:24px 18px 16px;border-bottom:1px solid rgba(180,160,120,.1);text-align:center}
.sidebar-header .logo{font-size:22px;letter-spacing:.12em;color:#e0d4b8;margin-bottom:4px}
.sidebar-header .ver{font-size:11px;color:rgba(180,150,110,.35);letter-spacing:.1em}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
.sidebar-nav a{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;font-size:13px;color:rgba(200,180,140,.5);
  text-decoration:none;border-left:2px solid transparent;
  transition:all .25s;letter-spacing:.04em}
.sidebar-nav a:hover{color:rgba(230,210,160,.85);
  background:rgba(200,170,120,.06);border-left-color:rgba(200,170,120,.3)}
.sidebar-nav a.active{color:#e0d4b8;background:rgba(200,170,120,.1);
  border-left-color:rgba(200,170,120,.6)}
.sidebar-nav a .nav-code{font-size:10px;color:rgba(180,150,100,.35);margin-right:4px}
.sidebar-nav a .nav-count{font-size:10px;color:rgba(180,150,110,.3);
  background:rgba(180,160,120,.08);padding:1px 6px;border-radius:8px}
.sidebar-footer{padding:12px 18px;border-top:1px solid rgba(180,160,120,.1);
  font-size:11px;color:rgba(180,150,110,.3);text-align:center;letter-spacing:.06em}

/* ── Hero ── */
.hero{padding:48px 32px 32px;text-align:center}
.hero .ep{font-size:14px;letter-spacing:.3em;color:rgba(190,160,120,.45);margin-bottom:8px}
.hero h1{font-size:clamp(36px,6vw,60px);font-weight:300;letter-spacing:.15em;
  color:#e0d4b8;margin-bottom:8px}
.hero .sub{font-size:15px;color:rgba(200,180,140,.4);letter-spacing:.12em}
.hero .meta{margin-top:16px;font-size:13px;color:rgba(180,150,110,.35);letter-spacing:.08em}

/* ── Category Divider ── */
.cat-divider{max-width:1200px;margin:40px auto 0;padding:0 24px;
  display:flex;align-items:center;gap:14px}
.cat-divider .line{flex:1;height:1px;background:rgba(180,160,120,.12)}
.cat-divider .cat-code{font-size:12px;letter-spacing:.08em;color:rgba(180,150,100,.35)}
.cat-divider .cat-label{font-size:14px;letter-spacing:.15em;
  color:rgba(200,170,120,.45);white-space:nowrap}

/* ── Section ── */
.section-title{max-width:1200px;margin:20px auto 16px;padding:0 24px;
  font-size:15px;color:rgba(200,180,140,.3);letter-spacing:.08em}

/* ── Gallery ── */
.gallery{max-width:1200px;margin:0 auto;padding:0 24px 32px;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:24px;align-items:start}
.card{background:#111524;border:1px solid rgba(140,120,80,.15);
  border-radius:10px;overflow:hidden;cursor:pointer;
  transition:transform .35s ease,box-shadow .35s ease,border-color .35s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 30px rgba(180,140,80,.08);
  border-color:rgba(180,140,80,.35)}
.card .img-box{width:100%;overflow:hidden;background:#0a0d16;
  display:flex;align-items:center;justify-content:center}
.card .img-box img{width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s ease}
.card:hover .img-box img{transform:scale(1.04)}
.card .info{padding:14px 16px;text-align:center}
.card .info .name{font-size:16px;color:#d4c8a0;letter-spacing:.06em;margin-bottom:4px}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.92);align-items:center;justify-content:center;flex-direction:column}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:82vh;object-fit:contain;
  border:1px solid rgba(180,160,120,.15);border-radius:4px}
.lightbox .lb-info{margin-top:16px;font-size:16px;color:rgba(220,200,160,.7);
  letter-spacing:.08em;text-align:center;max-width:80vw}
.lightbox .lb-counter{font-size:12px;color:rgba(180,150,120,.4);margin-top:6px}
.lightbox .lb-close{position:fixed;top:20px;right:28px;font-size:36px;
  color:rgba(200,170,120,.6);cursor:pointer;background:none;border:none;
  transition:color .25s;line-height:1;z-index:10000}
.lightbox .lb-close:hover{color:#e0d4b8}
.lightbox .lb-nav{position:fixed;top:50%;transform:translateY(-50%);
  font-size:48px;color:rgba(200,170,120,.4);cursor:pointer;background:none;
  border:none;transition:color .25s;z-index:10000;padding:20px}
.lightbox .lb-nav:hover{color:#e0d4b8}
.lightbox .lb-prev{left:20px}
.lightbox .lb-next{right:20px}

/* ── Footer ── */
.footer{text-align:center;padding:40px 24px 60px;
  font-size:14px;letter-spacing:.1em;color:rgba(170,150,110,.35)}

/* ── Stars bg ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 25% 55%,rgba(255,255,255,.3),transparent),
    radial-gradient(1.5px 1.5px at 40% 15%,rgba(255,255,255,.55),transparent),
    radial-gradient(1px 1px at 55% 70%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 70% 35%,rgba(255,255,255,.25),transparent),
    radial-gradient(1.5px 1.5px at 85% 60%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 15% 85%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 60% 85%,rgba(255,255,255,.4),transparent)}

/* ── Password Gate ── */
.pw-gate{position:fixed;inset:0;z-index:99999;background:#0d1020;
  display:flex;align-items:center;justify-content:center;flex-direction:column}
.pw-gate.hidden{display:none}
.pw-box{text-align:center;padding:48px 40px;background:#111524;
  border:1px solid rgba(140,120,80,.2);border-radius:12px;max-width:380px;width:90%}
.pw-box h3{font-size:20px;font-weight:300;letter-spacing:.12em;color:#e0d4b8;margin-bottom:8px}
.pw-box .pw-sub{font-size:13px;color:rgba(180,160,120,.4);letter-spacing:.06em;margin-bottom:28px}
.pw-box input{width:100%;padding:12px 16px;font-size:16px;letter-spacing:.1em;
  background:#0a0d16;border:1px solid rgba(140,120,80,.25);border-radius:6px;
  color:#e0d4b8;text-align:center;outline:none;transition:border-color .25s}
.pw-box input:focus{border-color:rgba(200,170,120,.5)}
.pw-box input::placeholder{color:rgba(150,130,100,.3)}
.pw-box button{margin-top:16px;width:100%;padding:12px;font-size:16px;
  letter-spacing:.1em;color:#0a0a14;background:rgba(200,170,120,.7);
  border:none;border-radius:6px;cursor:pointer;transition:background .25s}
.pw-box button:hover{background:rgba(220,190,140,.85)}
.pw-err{margin-top:14px;font-size:13px;color:rgba(200,100,80,.7);
  letter-spacing:.05em;min-height:18px}

/* ── Responsive ── */
@media(max-width:900px){
  .gallery{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
}
@media(max-width:700px){
  .sidebar{display:none}.main{margin-left:0}
  .gallery{grid-template-columns:1fr}
  .hero h1{font-size:28px}
}

/* ── Hamburger (mobile) ── */
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:36px;height:36px;background:#111524;border:1px solid rgba(180,160,120,.2);
  border-radius:6px;cursor:pointer;flex-direction:column;align-items:center;
  justify-content:center;gap:4px}
.hamburger span{display:block;width:18px;height:1.5px;background:rgba(200,170,120,.6)}
@media(max-width:700px){.hamburger{display:flex}}
.sidebar.mobile-open{display:flex!important;position:fixed;z-index:150;
  width:220px;box-shadow:4px 0 30px rgba(0,0,0,.8)}
</style>
</head>

<script>
/* ── Password Gate ── */
(function(){if(sessionStorage.getItem("lingti_auth")==="1"){document.getElementById("pwGate").classList.add("hidden");return}})();
var PW_HASH="019be397cf10ba2e242d7507db0852b1dcab423c62bd150024ef1333a68136aa";
async function checkPw(){var i=document.getElementById("pwInput"),e=document.getElementById("pwErr"),g=document.getElementById("pwGate");
if(!i.value){e.textContent="请输入密码";return}
var h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(i.value));
var hex=Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
if(hex===PW_HASH){g.classList.add("hidden");sessionStorage.setItem("lingti_auth","1")}
else{e.textContent="密码错误，请重试";i.value="";i.focus()}}
</script>

/* ── Build Sidebar ── */
var nav = document.getElementById("sidebarNav");
CHARS.forEach(function(c){
  var a = document.createElement("a");
  a.href = "#" + c.section_id;
  a.innerHTML = '<span class="nav-code">' + c.code + '</span>' + c.name +
    '<span class="nav-count">' + c.count + '</span>';
  a.setAttribute("data-section", c.section_id);
  nav.appendChild(a);
});

/* ── Build Content ── */
var root = document.getElementById("content-root");
CHARS.forEach(function(c){
  // Divider
  var div = document.createElement("div");
  div.className = "cat-divider";
  div.id = c.section_id;
  div.innerHTML = '<div class="line"></div><span class="cat-code">' + c.code + '</span><span class="cat-label">' + c.name + '</span><div class="line"></div>';
  root.appendChild(div);

  // Section title
  var st = document.createElement("div");
  st.className = "section-title";
  st.textContent = c.code + " · " + c.name + "（" + c.count + " 张）";
  root.appendChild(st);

  // Gallery
  var gal = document.createElement("div");
  gal.className = "gallery";
  c.images.forEach(function(img){
    var card = document.createElement("div");
    card.className = "card";
    card.onclick = function(){ openLb(img.global_idx); };
    card.innerHTML = '<div class="img-box"><img src="' + img.thumb + '" alt="' + c.name + '"></div>' +
      '<div class="info"><div class="name">' + img.label + '</div></div>';
    gal.appendChild(card);
  });
  root.appendChild(gal);
});

/* ── Scroll Spy ── */
var navLinks = document.querySelectorAll(".sidebar-nav a");
function updateActive(){
  var sy = window.scrollY + 140;
  var active = null;
  navLinks.forEach(function(a){
    var sec = document.getElementById(a.getAttribute("data-section"));
    if (sec && sec.offsetTop <= sy) active = a;
  });
  if (active) {
    navLinks.forEach(function(a){ a.classList.remove("active"); });
    active.classList.add("active");
  }
}
window.addEventListener("scroll", updateActive);
updateActive();

/* ── Lightbox ── */
var lb = document.getElementById("lightbox");
var lbImg = document.getElementById("lbImg");
var lbInfo = document.getElementById("lbInfo");
var lbCounter = document.getElementById("lbCounter");
var curIdx = 0;

function openLb(idx){
  curIdx = idx;
  var img = ALL_IMGS[idx];
  lbImg.src = img.full; /* fallback: if full 404s, use thumb */ lbImg.onerror = function(){ lbImg.src = img.thumb; lbImg.onerror = null; };
  lbInfo.textContent = img.label;
  lbCounter.textContent = (idx+1) + " / " + ALL_IMGS.length;
  lb.classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeLb(e){
  if (e && e.target !== lb && e.target !== lbImg && e.target.className !== "lb-close") return;
  lb.classList.remove("show");
  document.body.style.overflow = "";
}

function lbNav(dir, e){
  e.stopPropagation();
  curIdx = (curIdx + dir + ALL_IMGS.length) % ALL_IMGS.length;
  openLb(curIdx);
}

document.addEventListener("keydown", function(e){
  if (!lb.classList.contains("show")) return;
  if (e.key === "Escape") { lb.classList.remove("show"); document.body.style.overflow = ""; }
  if (e.key === "ArrowLeft") { curIdx = (curIdx - 1 + ALL_IMGS.length) % ALL_IMGS.length; openLb(curIdx); }
  if (e.key === "ArrowRight") { curIdx = (curIdx + 1) % ALL_IMGS.length; openLb(curIdx); }
});

/* ── Mobile Sidebar ── */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("mobile-open");
}
document.getElementById("sidebar").addEventListener("click", function(e){
  if (e.target.tagName === "A" && window.innerWidth <= 700) {
    this.classList.remove("mobile-open");
  }
});
</script>
