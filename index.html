CHARS.forEach(function(c){var div=document.createElement("div");div.className="cat-divider"+(c.is_protagonist?" protagonist-divider":"");div.id=c.section_id;div.innerHTML='<div class="line"></div><span class="cat-code">'+c.code+'</span><span class="cat-label">'+c.name+'</span><div class="line"></div>';root.appendChild(div);var st=document.createElement("div");st.className="section-title";st.textContent=c.code+" · "+c.name+"（"+c.count+" 张）";root.appendChild(st);var gal=document.createElement("div");gal.className="gallery";c.images.forEach(function(img){var card=document.createElement("div");card.className="card";card.onclick=function(){openLb(img.global_idx)};card.innerHTML='<div class="img-box"><img src="'+img.thumb+'" alt="'+c.name+'"></div><div class="info"><div class="name">'+img.label+'</div></div>';gal.appendChild(card)});root.appendChild(gal)});
var navLinks=document.querySelectorAll(".sidebar-nav a");
function updateActive(){var sy=window.scrollY+140;var active=null;navLinks.forEach(function(a){var sec=document.getElementById(a.getAttribute("data-section"));if(sec&&sec.offsetTop<=sy)active=a});if(active){navLinks.forEach(function(a){a.classList.remove("active")});active.classList.add("active")}}
window.addEventListener("scroll",updateActive);updateActive();
var lb=document.getElementById("lightbox"),lbImg=document.getElementById("lbImg"),lbInfo=document.getElementById("lbInfo"),lbCounter=document.getElementById("lbCounter"),curIdx=0;
function openLb(idx){curIdx=idx;var img=ALL_IMGS[idx];lbImg.src=img.full;lbImg.onerror=function(){lbImg.src=img.thumb;lbImg.onerror=null};lbInfo.textContent=img.label;lbCounter.textContent=(idx+1)+" / "+ALL_IMGS.length;lb.classList.add("show");document.body.style.overflow="hidden"}
function closeLb(e){if(e&&e.target!==lb&&e.target!==lbImg&&e.target.className!=="lb-close")return;lb.classList.remove("show");document.body.style.overflow=""}
function lbNav(dir,e){e.stopPropagation();curIdx=(curIdx+dir+ALL_IMGS.length)%ALL_IMGS.length;openLb(curIdx)}
document.addEventListener("keydown",function(e){if(!lb.classList.contains("show"))return;if(e.key==="Escape"){lb.classList.remove("show");document.body.style.overflow=""}if(e.key==="ArrowLeft"){curIdx=(curIdx-1+ALL_IMGS.length)%ALL_IMGS.length;openLb(curIdx)}if(e.key==="ArrowRight"){curIdx=(curIdx+1)%ALL_IMGS.length;openLb(curIdx)}});
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("mobile-open")}
document.getElementById("sidebar").addEventListener("click",function(e){if(e.target.tagName==="A"&&window.innerWidth<=700){this.classList.remove("mobile-open")}});
</script>
</body>
</html>
